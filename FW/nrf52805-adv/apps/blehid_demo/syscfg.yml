# Settings this app defines.
syscfg.defs:

# Settings this app overrides.
syscfg.vals:
  BLE_ROLE_PERIPHERAL: 1
  BLE_ROLE_BROADCASTER: 1
  BLE_LL_CFG_FEAT_LE_ENCRYPTION: 1
  BLE_EXT_ADV: 0
  BLE_VERSION: 52
  CONSOLE_IMPLEMENTATION: stub
  LOG_IMPLEMENTATION: stub
  STATS_IMPLEMENTATION: stub
  # Enable bonding + LE Secure Connections and persistent storage
  BLE_SM_BONDING: 1
  BLE_SM_SC: 1
  BLE_SM_LVL: 2 # allow to pair despite MITM being on or off

  # Use FCB in the BSP-defined FLASH_AREA_NFFS region for sys/config storage
  CONFIG_FCB: 1
  # Ensure NimBLE store/config persists bonds and CCCDs via sys/config
  BLE_STORE_CONFIG_PERSIST: 1
  UART_0: 1

